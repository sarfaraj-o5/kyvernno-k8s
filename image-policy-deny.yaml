apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-image-registries
spec:
  validationFailureAction: Enforce
  rules:
    - name: check-image-registry
      match:
        resources:
          kinds:
            - Pod 
      validate:
        message: "Only images from approved registries are allowed."
        pattern:
          spec:
            containers:
              - image: "approved-registry.com/*"
---